# ──────────────────────────────────────────────────────────
#  Vedha — Local Development Docker Compose
#  Usage:  docker compose up --build
# ──────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vedha-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vedha
      POSTGRES_USER: vedha
      POSTGRES_PASSWORD: vedha_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vedha"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────
  backend:
    build: ./backend
    container_name: vedha-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vedha
      SPRING_DATASOURCE_USERNAME: vedha
      SPRING_DATASOURCE_PASSWORD: vedha_secret
      SPRING_PROFILES_ACTIVE: render
      JWT_SECRET: local-dev-jwt-secret-key-change-in-production!!
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      PORT: 8080
    ports:
      - "8080:8080"

  # ── React Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: vedha-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:80"

volumes:
  pgdata:
