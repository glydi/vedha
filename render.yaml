# ──────────────────────────────────────────────────────────
#  Render Blueprint — Infrastructure as Code
#
#  Your PostgreSQL is already provisioned on Render (Singapore).
#  
#  Deployment:
#  1. Push this repo to GitHub
#  2. Go to https://dashboard.render.com
#  3. Click "New" → "Blueprint" → connect your repo
#  4. Render reads this file and creates the services
#  5. After deploy, set CORS_ALLOWED_ORIGINS on the backend
#     to your frontend URL (e.g. https://vedha-frontend.onrender.com)
# ──────────────────────────────────────────────────────────

services:
  # ── Backend (Spring Boot / Docker) ────────────────────────
  - type: web
    name: vedha-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/snippets
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://npvwzgnwprxt.db.dbaas.dev:30731/PwKFWx
      - key: SPRING_DATASOURCE_USERNAME
        value: pGYRXxF
      - key: SPRING_DATASOURCE_PASSWORD
        value: ZGGAzvC
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set after frontend deploys

  # ── Frontend (React / Static Site) ───────────────────────
  - type: web
    name: vedha-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vedha-backend
          property: hostport
