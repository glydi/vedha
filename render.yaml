# ──────────────────────────────────────────────────────────
#  Render Blueprint — Infrastructure as Code
#
#  Two services: Backend (Spring Boot) + Frontend (React Static)
#  PostgreSQL is already provisioned on Render (Singapore).
#  
#  Deployment:
#  1. Push this repo to GitHub
#  2. Go to https://dashboard.render.com
#  3. Click "New" → "Blueprint" → connect your repo
#  4. Render reads this file and creates both services
#  5. After both services deploy, update CORS_ALLOWED_ORIGINS on backend
#     to match your frontend URL (e.g. https://vedha-frontend.onrender.com)
# ──────────────────────────────────────────────────────────

services:
  # ── Backend (Spring Boot in Docker) ───────────────────────
  - type: web
    name: vedha-backend
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "10000"
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://npvwzgnwprxt.db.dbaas.dev:30731/PwKFWx
      - key: SPRING_DATASOURCE_USERNAME
        value: pGYRXxF
      - key: SPRING_DATASOURCE_PASSWORD
        value: ZGGAzvC
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:5173
        sync: false

  # ── Frontend (React Static Site) ──────────────────────────
  - type: web
    name: vedha-frontend
    runtime: static
    plan: free
    region: singapore
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600, must-revalidate
    envVars:
      - key: VITE_API_BASE_URL
        value: ""
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vedha-backend
          property: hostport
